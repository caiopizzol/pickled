name: Agent dogfood

# Manual-only for now. Agent-target runs are stochastic and cost real LLM
# tokens; we don't want every push to burn budget or block infra on a flaky
# model day. Trigger from the Actions tab when you want a real signal.
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run --cwd apps/cli build

      # The check step is intentionally non-blocking. A low score is signal,
      # not infra failure. The receipt (pickled-report.json) is uploaded
      # regardless so a failing run still leaves an artifact to inspect.
      - name: pickled check (--target quick)
        id: check
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ./apps/cli/dist/index.js check . \
            --target quick \
            --output pickled-report.json \
            --verbose

      - name: Upload receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pickled-report
          path: pickled-report.json
          if-no-files-found: warn
