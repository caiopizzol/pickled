name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/cli/**"
      - "packages/core/**"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      # Gate: do not publish from a red commit. CI runs the same checks in
      # parallel but its conclusion does not currently feed back into this
      # workflow (workflows run independently). Running verify here keeps
      # the publish pipeline self-contained: if lint, tests, build, or
      # the audit fail, the release does not happen. See the v0.12.0
      # post-mortem in commit history.
      - name: Verify before release
        run: bun run verify

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_RELEASE }}
        working-directory: apps/cli
        run: bun run release
