# 🥒 pickled.yml - Check your freshness!

tool:
  name: "pickled"
  description: "CLI tool to check if AI can correctly answer questions about your developer tool"

scenarios:
  - name: "Installation"
    prompt: "How do I install pickled?"

  - name: "Getting started"
    prompt: "How do I set up pickled for my project?"

  - name: "Config format"
    prompt: "What is the pickled.yml config format? Show me an example."

  - name: "Running checks"
    prompt: "How do I run pickled to check my documentation?"

  - name: "Named targets"
    prompt: "How do I define and use named targets in pickled?"

  - name: "CI integration"
    prompt: "How do I use pickled in CI/CD with a threshold?"

threshold: 70
