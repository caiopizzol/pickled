# 🥒 pickled.yml - agent legibility check for pickled itself

tool:
  name: "pickled"
  description: "Agent legibility checker for developer tools"

docs:
  sources:
    readme: ./README.md
    brand: ./brand.md
    agents: ./AGENTS.md
    comment_policy: ./comment-policy.md
    cli_readme: ./apps/cli/README.md
    llms: ./llms.txt

targets:
  quick:
    category: cli
    provider: claude-code
    model: haiku
    maxTurns: 5

  thorough:
    category: cli
    provider: claude-code
    model: sonnet
    maxTurns: 15

  codex:
    category: cli
    provider: codex-cli
    model: gpt-5.5

matrix:
  target: [quick, codex]

scenarios:
  - name: "Installation"
    prompt: "How do I install pickled?"
    requiredSources: [readme]

  - name: "Basic usage"
    prompt: "How do I run pickled to check my project?"
    requiredSources: [readme]

  - name: "Config format"
    prompt: "What does a pickled.yml config file look like?"
    requiredSources: [readme]
    traps:
      - id: old_schema
        match: "docs.source:"
        reason: "Recommends removed singular docs.source schema"
      - id: old_freshness_brand
        pattern: '\bfreshness\s+score\b'
        flags: i
        reason: "Uses removed 'freshness score' branding"

  # Brand/spec dogfood. Each scenario requires a different registered source
  # so the run measures more than just README coverage. No traps in v1: we
  # want the baseline to reveal failure modes before pre-committing fragile
  # pattern matchers.

  - name: "Verdict layers"
    prompt: "What is the difference between pickled's scenario verdict and run verdict?"
    requiredSources: [brand]

  - name: "JSON contract"
    prompt: "Does pickled's JSON output include human-facing labels like 'Well grounded'?"
    requiredSources: [brand]

  - name: "Target semantics"
    prompt: "How do I run pickled check against only one configured target?"
    requiredSources: [cli_readme]

  - name: "Agent context contract"
    prompt: "I'm a coding agent working on the pickled codebase for the first time. Where should I look first for brand voice, comment rules, and load-bearing invariants?"
    requiredSources: [agents]

  - name: "Comment policy"
    prompt: "When should an AIDEV-NOTE comment be added to pickled's source code?"
    requiredSources: [comment_policy]

  - name: "Pickled contracts"
    prompt: "What is pickled and what contracts should agents preserve when describing it?"
    requiredSources: [llms]

threshold: 60
