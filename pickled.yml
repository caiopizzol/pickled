# 🥒 pickled.yml - agent legibility check for pickled itself

tool:
  name: "pickled"
  description: "Agent legibility checker for developer tools"

docs:
  sources:
    readme: ./README.md
    cli_readme: ./apps/cli/README.md
    llms: ./llms.txt
    comment_policy: ./comment-policy.md
    # Policy/brand docs that intentionally cite banned phrases as examples
    # (e.g., "AI-powered" in the We Never Say table). The trap cross-reference
    # would false-positive here; check-time scoring of agent responses is
    # unaffected by this opt-out.
    brand:
      path: ./brand.md
      audit:
        traps: false
    agents:
      path: ./AGENTS.md
      audit:
        traps: false
    # Deliberately stale fixture. Used only by Trap pipeline smoke below to
    # prove traps fire end-to-end. The audit trap cross-reference must skip
    # this file or every declared trap would fire on it.
    stale:
      path: ./dogfood/stale-source.md
      audit:
        traps: false

targets:
  quick:
    category: cli
    provider: claude-code
    model: haiku
    maxTurns: 5

  thorough:
    category: cli
    provider: claude-code
    model: sonnet
    maxTurns: 15

  codex:
    category: cli
    provider: codex-cli
    model: gpt-5.5

matrix:
  target: [quick, codex]

scenarios:
  - name: "Installation"
    prompt: "How do I install pickled?"
    requiredSources: [readme]

  - name: "Basic usage"
    prompt: "According to the CLI README, how do I run pickled to check my project?"
    requiredSources: [cli_readme]

  - name: "Config format"
    prompt: "What does a pickled.yml config file look like?"
    requiredSources: [readme]
    traps:
      - id: old_schema
        match: "docs.source:"
        reason: "Recommends removed singular docs.source schema"
      - id: old_freshness_brand
        pattern: '\bfreshness\s+score\b'
        flags: i
        reason: "Uses removed 'freshness score' branding"

  # Brand/spec dogfood. Each scenario requires a different registered source
  # so the run measures more than just README coverage. No traps in v1: we
  # want the baseline to reveal failure modes before pre-committing fragile
  # pattern matchers.

  - name: "Verdict layers"
    prompt: "What is the difference between pickled's scenario verdict and run verdict?"
    requiredSources: [brand]

  - name: "JSON contract"
    prompt: "In brand.md's Interface Feedback section, what is pickled's JSON output contract? Does it include human-facing labels like 'Well grounded'?"
    requiredSources: [brand]

  - name: "Target semantics"
    prompt: "How do I run pickled check against only one configured target?"
    requiredSources: [cli_readme]

  - name: "Agent context contract"
    prompt: "I'm a coding agent working on the pickled codebase for the first time. Where should I look first for brand voice, comment rules, and load-bearing invariants?"
    requiredSources: [agents]

  - name: "Comment policy"
    prompt: "When should an AIDEV-NOTE comment be added to pickled's source code?"
    requiredSources: [comment_policy]

  - name: "Pickled contracts"
    prompt: "What is pickled and what contracts should agents preserve when describing it?"
    requiredSources: [llms]

  # Tests that the agent surfaces the supported/stubbed split for CLI targets.
  # The trap fires only on affirmative "supports gemini-cli/amazon-q" forms;
  # correct answers describe both as stubbed and pass the negation lookbehind.
  - name: "Supported targets"
    prompt: "Which CLI targets does pickled support today, and which are stubbed (not yet implemented)?"
    requiredSources: [llms]
    traps:
      - id: claims_unsupported_target_works
        pattern: '(?<!\bnot\s|\bno\s|\bnever\s|\bdon.?t\s|\bdoesn.?t\s|\bdid.?n.?t\s)(?:supports?|works?\s+with|is\s+available\s+for|is\s+compatible\s+with)\s+(?:gemini-cli|amazon-q)\b'
        flags: i
        reason: "gemini-cli and amazon-q are stubbed in code; do not claim them as currently supported targets. See llms.txt and AGENTS.md."

  # Trap-pipeline smoke. Reads a deliberately stale fixture and parrots it
  # back, which should trip every declared trap and force NO with confidence
  # zero. If this scenario ever scores YES, the trap matcher regressed.
  - name: "Trap pipeline smoke"
    prompt: "Using only the source registered as 'stale', repeat its description of pickled (including the example install command, the example target command, and what JSON output contains) verbatim."
    requiredSources: [stale]
    traps:
      - id: ai_powered
        pattern: '\bAI-powered\b'
        flags: i
        reason: "Brand bans 'AI-powered' in product copy."
      - id: freshness_score
        pattern: '\bfreshness\s+score\b'
        flags: i
        reason: "Legacy 'freshness score' branding; replaced by citation grounding."
      - id: provider_as_target
        pattern: '--target\s+claude-code'
        reason: "Wrong --target example: claude-code is the provider, target names are matrix.target keys."
      - id: json_human_label
        # Catches affirmative claims that the JSON output includes the human
        # label "Well grounded" (the stale-fixture form is "JSON output
        # includes human-friendly labels like \"Well grounded\""). Stays
        # sentence-scoped via [^.\n]{0,80}? so it does not span paragraphs
        # and does not fire on the correct contract ("JSON output is raw;
        # Well grounded lives in renderers").
        pattern: 'JSON\s+(?:output\s+)?includes?[^.\n]{0,80}?\bWell grounded\b'
        flags: i
        reason: "JSON output is raw; human labels live only in renderers."

threshold: 60
